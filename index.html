<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOCKEDCN - Заказ из Китая и Европы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding-top: 40px;
        }
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo h1 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo p {
            color: #8892b0;
            margin-top: 10px;
            font-size: 18px;
        }
        .calculator {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #ccd6f6;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 14px 18px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #e94560;
            box-shadow: 0 0 20px rgba(233,69,96,0.2);
        }
        input::placeholder {
            color: #5a6a8a;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233,69,96,0.4);
        }
        .result {
            margin-top: 25px;
            padding: 20px;
            background: rgba(233,69,96,0.1);
            border-radius: 12px;
            display: none;
        }
        .result.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result h3 {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 20px;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .result-row:last-child {
            border-bottom: none;
            font-weight: 700;
            font-size: 18px;
            color: #e94560;
            padding-top: 15px;
        }
        .region-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .region-cn { background: #ff4757; }
        .region-eu { background: #3742fa; }
        .info {
            margin-top: 30px;
            text-align: center;
            color: #8892b0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>LOCKEDCN</h1>
            <p>Заказ из Китая и Европы</p>
        </div>
        
        <div class="calculator">
            <div class="input-group">
                <label>Ссылка на товар</label>
                <input type="url" id="productUrl" placeholder="https://..." />
            </div>
            
            <div class="input-group">
                <label>Цена товара (¥ / € / $)</label>
                <input type="number" id="productPrice" placeholder="Введите цену" />
            </div>
            
            <div class="input-group">
                <label>Вес товара (кг)</label>
                <input type="number" id="weight" placeholder="Например: 0.5" step="0.1" />
            </div>
            
            <button class="btn" onclick="calculate()">Рассчитать стоимость</button>
            
            <div class="result" id="result">
                <span class="region-tag" id="regionTag"></span>
                <h3>Итоговый расчёт</h3>
                <div class="result-row">
                    <span>Цена товара:</span>
                    <span id="priceResult"></span>
                </div>
                <div class="result-row">
                    <span>Доставка:</span>
                    <span id="deliveryResult"></span>
                </div>
                <div class="result-row">
                    <span>Комиссия сервиса (10%):</span>
                    <span id="commissionResult"></span>
                </div>
                <div class="result-row">
                    <span>Итого:</span>
                    <span id="totalResult"></span>
                </div>
            </div>
        </div>
        
        <p class="info">Расчёт приблизительный. Точная цена после подтверждения заказа.</p>
    </div>

    <script>
        const RATES = {
            CN: {
                name: 'Китай',
                pricePerKg: 350,
                currency: '¥',
                symbol: '¥'
            },
            EU: {
                name: 'Европа',
                pricePerKg: 500,
                currency: '€',
                symbol: '€'
            }
        };

        function detectRegion(url) {
            const chinaDomains = ['taobao.com', 'tmall.com', 'jd.com', '1688.com', 'aliexpress.com', 'weidian.com', 'poizon.com', 'suning.com'];
            const euDomains = ['amazon.de', 'amazon.co.uk', 'amazon.fr', 'amazon.it', 'amazon.es', 'ebay.co.uk', 'zalando.de', 'asos.com'];
            
            url = url.toLowerCase();
            
            if (chinaDomains.some(d => url.includes(d))) return 'CN';
            if (euDomains.some(d => url.includes(d))) return 'EU';
            
            return null;
        }

        function calculate() {
            const url = document.getElementById('productUrl').value;
            const price = parseFloat(document.getElementById('productPrice').value);
            const weight = parseFloat(document.getElementById('weight').value) || 0;
            
            if (!url || !price) {
                alert('Пожалуйста, заполните ссылку и цену товара');
                return;
            }
            
            let region = detectRegion(url);
            
            if (!region) {
                const choice = prompt('Регион не определён автоматически. Введите: 1 - Китай, 2 - Европа');
                if (choice === '1') region = 'CN';
                else if (choice === '2') region = 'EU';
                else {
                    alert('Пожалуйста, укажите регион');
                    return;
                }
            }
            
            const rate = RATES[region];
            const deliveryCost = weight * rate.pricePerKg;
            const commission = price * 0.1;
            const total = price + deliveryCost + commission;
            
            document.getElementById('regionTag').textContent = rate.name;
            document.getElementById('regionTag').className = 'region-tag region-' + region.toLowerCase();
            document.getElementById('priceResult').textContent = `${price.toFixed(2)} ${rate.symbol}`;
            document.getElementById('deliveryResult').textContent = `${deliveryCost.toFixed(2)} ₽`;
            document.getElementById('commissionResult').textContent = `${commission.toFixed(2)} ${rate.symbol}`;
            document.getElementById('totalResult').textContent = `${total.toFixed(2)} ₽`;
            
            document.getElementById('result').classList.add('show');
        }
    </script>
</body>
</html>
